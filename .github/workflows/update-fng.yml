name: CNN Fear and Greed
on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Descargar JSON de CNN
        run: |
          codigo=$(curl -s -w "%{http_code}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: application/json" \
            "https://production.dataviz.cnn.io/index/fearandgreed/graphdata" \
            -o fear_greed.json)
          echo "HTTP code: $codigo"
          echo "----- primeros 300 caracteres -----"
          head -c 300 fear_greed.json
          echo ""
          echo "-----------------------------------"
      - name: Verificar (no aborta)
        run: |
          python3 -c "import json; d=json.load(open('fear_greed.json')); print('OK', d['fear_and_greed']['score'])" || echo "Verificacion fallida (mira el paso anterior)"
