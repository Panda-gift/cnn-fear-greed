name: CNN Fear and Greed
on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Descargar JSON de Fear & Greed
        run: |
          codigo=$(curl -s -w "%{http_code}" -L \
            "https://raw.githubusercontent.com/whit3rabbit/fear-greed-data/main/json/cnn_output.json" \
            -o fear_greed.json)
          echo "HTTP code: $codigo"
          echo "Tamaño: $(wc -c < fear_greed.json) bytes"
          head -c 200 fear_greed.json
      - name: Verificar (no aborta)
        run: |
          python3 -c "import json; d=json.load(open('fear_greed.json')); print('OK', d['fear_and_greed']['score'])" || echo "Verificacion fallida (mira el paso anterior)"
      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fear_greed.json
          git diff --staged --quiet || git commit -m "Update F&G $(date -u +%F)"
          git push
